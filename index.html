<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="player-site-public-base-path" content="/skazkawiki-live">
  <title>World Codex Player Site</title>
  <link rel="icon" href="/skazkawiki-live/favicon.ico?v=a1f9f4979b82">
  <link rel="stylesheet" href="/skazkawiki-live/assets/player-site.css?v=a1f9f4979b82">
</head>
<body data-depth="0">
  <main class="root-redirect">
    <h1>World Codex Player Site</h1>
    <p>Opening the published world.</p>
    <p><a href="/skazkawiki-live/worlds/caelumbra/">Open Caelumbra</a></p>
  </main>
  <script>
    (() => {
      try {
        const worlds = ["caelumbra"];
        const remembered = window.localStorage.getItem("world-codex:last-world");
        const slug = worlds.includes(remembered) ? remembered : "caelumbra";
        const here = new URL(window.location.href);
        if (!here.pathname.endsWith("/")) here.pathname += "/";
        window.location.replace(new URL("worlds/" + slug + "/", here).toString());
      } catch {
        const link = document.querySelector("a[href]");
        if (link) window.location.replace(link.href);
      }
    })();
  </script>
</body>
</html>
